version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - misspell
    - gosec
    - bodyclose
    - nilerr
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: package-comments
        - name: var-naming
        - name: context-as-argument
        - name: error-return
        - name: error-naming
    gocritic:
      disabled-checks:
        - ifElseChain
    gosec:
      excludes:
        # int -> int32 when mapping bounded domain values (part indices, text
        # offsets) onto proto32 fields. Overflow is not reachable in practice.
        - G115
  exclusions:
    rules:
      # Generated golden fixtures and tests may relax some rules.
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/photon-hq/advanced-imessage-go
