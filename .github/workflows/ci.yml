name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
        # connectrpc.com/connect requires Go 1.25+, which sets the floor.
      matrix:
        go: ["1.25", "1.26"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # v8 installs golangci-lint v2 (built with a recent Go toolchain) and
      # understands the version: "2" config schema.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
